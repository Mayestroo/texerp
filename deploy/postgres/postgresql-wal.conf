# PostgreSQL Write-Ahead Logging (WAL) & Continuous Archiving Config

# Enable WAL archiving
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# Archive timeout (forces WAL file switch every 15 minutes)
archive_timeout = 900

# Retention & Checkpoint Tuning
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
