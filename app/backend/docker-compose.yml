services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: texerp
      POSTGRES_USER: texerp
      POSTGRES_PASSWORD: texerp
    ports:
      - "5432:5432"
    volumes:
      - texerp_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-create-app-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U texerp -d texerp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - texerp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  texerp_postgres_data:
  texerp_redis_data:
